# Thesis profile: the feature set of the original dissertation
# (Backer 2004), loosely equivalent by design (see docs/V2_ROADMAP.md).
#
# The original static features were color, eccentricity, and symmetry
# (stereo and onset follow in roadmap M5). Intensity and orientation are
# Itti-Koch-style additions of the reimplementation and stay disabled here.
#
# Selection: two-stage neural-field selection (roadmap M3) — 2D Amari field
# dynamics ported from the dissertation's nf2d, with the cluster/Objectfile
# readout of thesis chapters 6/7 in minimal form. Parameters are the original
# code defaults; the thesis itself is qualitative about most of them.

pipeline:
  fusion: weighted-sum
  selection: neural-field
  selection_params:
    alpha: 0.5
    beta: 30.0
    resting: -0.25
    global_mult: 1.0
    kernel_s: 5.0
    kernel_k: 0.06
    max_cycles: 55        # thesis: cutoff 55 cycles, ~10 typical
    change_thresh: 0.02   # thesis: mean |du| < 0.02
    ior_decay: 0.8        # thesis: inhibition reduced 20% per frame

features:
  color:
    weight: 1.0
  eccentricity:
    weight: 1.0
  symmetry:
    weight: 1.0
  intensity:
    enabled: false
  orientation:
    enabled: false

# Note: neural-field selection reads only max_count and ior_strength (the
# space-based IOR level); the field itself decides what is salient enough
peaks:
  max_count: 10
  ior_strength: 0.8

output:
  output_dir: "results/"
  display: false
