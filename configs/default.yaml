# Default configuration: mirrors the built-in defaults (all five features,
# weighted-sum fusion, NMS selection).
#
# See also:
#   configs/thesis.yaml  - dissertation feature set with IOR selection
#   configs/modern.yaml  - full modern baseline
#   configs/classic_parameters.yaml - dissertation parameter values (reference)

input:
  image: "../data/test_images/test.jpg"

pipeline:
  fusion: weighted-sum
  selection: nms

features:
  color:
    weight: 1.0
  intensity:
    weight: 1.0
  orientation:
    weight: 1.0
  eccentricity:
    weight: 1.0
  symmetry:
    weight: 1.0

peaks:
  min_distance: 30
  threshold: 0.3
  max_count: 10

output:
  save_features: true
  save_saliency: true
  output_dir: "results/"
  display: false
