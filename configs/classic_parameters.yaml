# Classic Parameters from Dissertation
# These values were validated in the original research.
#
# Blocks for not-yet-ported subsystems are kept below as commented reference:
# the neural-field parameters are consumed starting roadmap M3, stereo in M5.

input:
  image: "../data/test_images/test.jpg"

features:
  color:
    weight: 1.2           # From readargs.h:89
  intensity:
    weight: 0.35          # From readargs.h:90
  symmetry:
    weight: 1.6           # From readargs.h:91

pipeline:
  selection: neural-field # Two-stage neural-field selection (M3)
  selection_params:
    alpha: 0.5
    beta: 30.0
    resting: -0.25
    global_mult: 1.0

peaks:
  ior_strength: 0.5

