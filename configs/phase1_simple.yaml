# Phase 1 Simple Configuration
# Basic 2-feature attention with weighted integration

input:
  image: "../data/test_images/test.jpg"

features:
  color:
    weight: 1.2
  intensity:
    weight: 0.8
  orientation:
    enabled: false
  eccentricity:
    enabled: false
  symmetry:
    enabled: false

output:
  save_features: true
  save_saliency: true
  output_dir: "results/"
